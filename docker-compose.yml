version: '3.8'

services:
  # ── PostgreSQL: Configurations, Test Suites, and Suggestions ──
  postgres:
    image: postgres:16-alpine
    container_name: veri-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veri_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veri_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-veri_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veri_admin -d veri_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ClickHouse: Columnar Storage for High-Volume Event Telemetry ──
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: veri-clickhouse
    ports:
      - "9000:9000" # native client
      - "8123:8123" # HTTP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/clickhouse/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS: Lightweight, High-Throughput Message Broker with JetStream ──
  nats:
    image: nats:2.10-alpine
    container_name: veri-nats
    ports:
      - "4222:4222" # client connection
      - "8222:8222" # monitoring HTTP port
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis: Real-time session status cache and websocket alerts pub/sub ──
  redis:
    image: redis:7-alpine
    container_name: veri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO: Object storage for binary / serialized golden test fixtures ──
  minio:
    image: minio/minio:RELEASE.2024-03-07T09-43-48Z
    container_name: veri-minio
    ports:
      - "9001:9001" # console port
      - "9000:9000" # API port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-veri_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-veri_minio_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  clickhouse_data:
  nats_data:
  redis_data:
  minio_data:
